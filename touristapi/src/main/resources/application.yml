spring:
  application:
    name: touristapi
  liquibase:
    enabled: true
    change-log: classpath:liquibase/changelog-master.xml
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:dulich2}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

google:
  map:
    api:
      key: ${API_GOOGLE_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true