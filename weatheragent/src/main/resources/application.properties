spring.application.name=weatheragent
spring.ai.retry.max-attempts=1
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.options.temperature=0.7
spring.ai.openai.options.max-tokens=1000

management.endpoints.web.exposure.include=mappings,health,info

server.port=8082
server.servlet.context-path=/
